@if (modalService.isOpen()) {
  <section id="appointment" class="bg-white py-16 lg:py-24">
  <!-- FIXED: Added explicit z-[100] to overlay on top of all animated components -->
  <div class="fixed inset-0 z-[100] flex items-center justify-center p-4 md:p-6 overflow-y-auto bg-slate-950/60 backdrop-blur-md">
    
    <!-- Backdrop Dismiss Click Shield Layer -->
    <div class="absolute inset-0 z-0" (click)="closeModal()"></div>

    <!-- MAIN LIGHTWEIGHT POPUP CONTAINER -->
    <div class="relative z-10 w-full max-w-5xl overflow-hidden rounded-[2.5rem] border border-slate-100 bg-white shadow-2xl transition-all duration-500 max-h-[90vh] overflow-y-auto">
      
      <!-- CORNER CLOSE ACTION BUTTON -->
      <button 
        (click)="closeModal()" 
        type="button"
        class="absolute right-5 top-5 z-50 flex h-10 w-10 items-center justify-center rounded-full bg-slate-100 text-slate-500 transition duration-300 hover:bg-red-50 hover:text-red-600 font-bold text-xl">
        ✕
      </button>

      <div class="grid lg:grid-cols-[0.85fr_1.15fr]">
        
        <!-- LEFT MEDICAL INFO INTRO BANNER -->
        <div class="bg-medical-900 p-8 text-white sm:p-10 lg:p-12 relative overflow-hidden flex flex-col justify-between">
          <div class="absolute -right-10 -top-10 h-40 w-40 rounded-full bg-white/5 blur-xl"></div>
          
          <div>
            <p class="mb-3 text-sm font-bold uppercase tracking-wider text-medical-200">Appointment</p>
            <h2 class="text-xl font-extrabold leading-tight sm:text-xl">Book a Consultation With {{ doctor?.name }}</h2>
            <p class="mt-5 text-sm leading-relaxed text-medical-100">
              Share your brain, spine, nerve, or trauma concern and preferred date. Same-day appointments are available for emergency cases.
            </p>
          </div>

          <div class="mt-8 space-y-3.5 text-sm font-semibold text-medical-50 border-t border-white/10 pt-6">
            <p class="flex items-center gap-2"><span>📞</span> <a class="underline-offset-4 hover:underline" [href]="'tel:' + doctor?.phone">{{ doctor?.phone }}</a></p>
            <p class="flex items-center gap-2"><span>✉️</span> <a class="underline-offset-4 hover:underline" [href]="'mailto:' + doctor?.email">{{ doctor?.email }}</a></p>
          </div>
        </div>

        <!-- RIGHT FORM INTERACTION ENGINE -->
        <form class="bg-white p-8 lg:p-10" [formGroup]="appointmentForm" (ngSubmit)="submit()" novalidate>
          <div class="grid gap-5 sm:grid-cols-2">
            <label class="block">
              <span class="text-sm font-bold text-slate-700">Full Name</span>
              <input class="mt-2 w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none transition focus:border-medical-500 focus:ring-4 focus:ring-medical-100" formControlName="name" type="text" placeholder="Your name">
              @if (hasError('name')) {
                <span class="mt-1 block text-xs font-semibold text-red-600">Enter at least 2 characters.</span>
              }
            </label>

            <label class="block">
              <span class="text-sm font-bold text-slate-700">Phone Number</span>
              <input class="mt-2 w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none transition focus:border-medical-500 focus:ring-4 focus:ring-medical-100" formControlName="phone" type="tel" placeholder="+91 98765 43210">
              @if (hasError('phone')) {
                <span class="mt-1 block text-xs font-semibold text-red-600">Enter a valid phone number.</span>
              }
            </label>
          </div>

          <label class="mt-5 block">
            <span class="text-sm font-bold text-slate-700">Preferred Date</span>
            <input class="mt-2 w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none transition focus:border-medical-500 focus:ring-4 focus:ring-medical-100" formControlName="date" type="date">
            @if (hasError('date')) {
              <span class="mt-1 block text-xs font-semibold text-red-600">Choose a preferred date.</span>
            }
          </label>

          <label class="mt-5 block">
            <span class="text-sm font-bold text-slate-700">Message</span>
            <textarea class="mt-2 min-h-28 w-full resize-y rounded-2xl border border-slate-200 px-4 py-3 outline-none transition focus:border-medical-500 focus:ring-4 focus:ring-medical-100" formControlName="message" placeholder="Briefly describe symptoms..."></textarea>
            @if (hasError('message')) {
              <span class="mt-1 block text-xs font-semibold text-red-600">Please add at least 10 characters.</span>
            }
          </label>

          <button class="btn-primary mt-6 w-full py-3.5 font-bold tracking-wide transition duration-300" type="submit">
            Send Consultation Request
          </button>
        </form>

      </div>
    </div>
  </div>
  </section>

}
