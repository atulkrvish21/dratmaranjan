<section id="appointment" class="bg-white py-16 lg:py-24">
  <div class="container-shell">
    <div class="grid overflow-hidden rounded-[2rem] border border-medical-100 bg-medical-900 shadow-lift lg:grid-cols-[0.85fr_1.15fr]">
      <div class="p-8 text-white sm:p-10 lg:p-12">
        <p class="mb-3 text-sm font-bold uppercase text-medical-200">Appointment</p>
        <h2 class="text-3xl font-extrabold leading-tight sm:text-4xl">Book a Consultation With {{ doctor.name }}</h2>
        <p class="mt-5 leading-7 text-medical-100">
          Share your brain, spine, nerve, or trauma concern and preferred date. Same-day appointments are available for emergency cases.
        </p>

        <div class="mt-8 space-y-4 text-sm font-semibold text-medical-50">
          <p>Phone: <a class="underline-offset-4 hover:underline" [href]="'tel:' + doctor.phone">{{ doctor.phone }}</a></p>
          <p>Email: <a class="underline-offset-4 hover:underline" [href]="'mailto:' + doctor.email">{{ doctor.email }}</a></p>
          <p>Location: {{ doctor.address }}</p>
        </div>
      </div>

      <form class="bg-white p-6 sm:p-8 lg:p-10" [formGroup]="appointmentForm" (ngSubmit)="submit()" novalidate>
        <div class="grid gap-5 sm:grid-cols-2">
          <label class="block">
            <span class="text-sm font-bold text-ink">Full Name</span>
            <input class="mt-2 w-full rounded-2xl border border-medical-100 px-4 py-3 outline-none transition focus:border-medical-500 focus:ring-4 focus:ring-medical-100" formControlName="name" type="text" placeholder="Your name">
            @if (hasError('name')) {
              <span class="mt-1 block text-xs font-semibold text-red-600">Enter at least 2 characters.</span>
            }
          </label>

          <label class="block">
            <span class="text-sm font-bold text-ink">Phone Number</span>
            <input class="mt-2 w-full rounded-2xl border border-medical-100 px-4 py-3 outline-none transition focus:border-medical-500 focus:ring-4 focus:ring-medical-100" formControlName="phone" type="tel" placeholder="+91 98765 43210">
            @if (hasError('phone')) {
              <span class="mt-1 block text-xs font-semibold text-red-600">Enter a valid phone number.</span>
            }
          </label>
        </div>

        <label class="mt-5 block">
          <span class="text-sm font-bold text-ink">Preferred Date</span>
          <input class="mt-2 w-full rounded-2xl border border-medical-100 px-4 py-3 outline-none transition focus:border-medical-500 focus:ring-4 focus:ring-medical-100" formControlName="date" type="date">
          @if (hasError('date')) {
            <span class="mt-1 block text-xs font-semibold text-red-600">Choose a preferred date.</span>
          }
        </label>

        <label class="mt-5 block">
          <span class="text-sm font-bold text-ink">Message</span>
          <textarea class="mt-2 min-h-32 w-full resize-y rounded-2xl border border-medical-100 px-4 py-3 outline-none transition focus:border-medical-500 focus:ring-4 focus:ring-medical-100" formControlName="message" placeholder="Briefly describe symptoms or reason for consultation"></textarea>
          @if (hasError('message')) {
            <span class="mt-1 block text-xs font-semibold text-red-600">Please add at least 10 characters.</span>
          }
        </label>

        <button class="btn-primary mt-7 w-full" type="submit">Send Consultation Request</button>
      </form>
    </div>
  </div>
</section>
