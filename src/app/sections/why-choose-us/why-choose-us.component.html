<section id="why-us" class="bg-medical-900 py-16 text-white lg:py-24">
  <div class="container-shell">

    <div class="grid gap-10 lg:grid-cols-[0.9fr_1.1fr] items-stretch">

      <!-- LEFT -->
      <div class="flex h-full flex-col justify-center">

        <p class="mb-3 text-sm font-bold uppercase text-medical-200">
          Why Choose Us
        </p>

        <h2 class="text-3xl font-extrabold leading-tight sm:text-4xl">
          Why Choose Dr. Atmaranjan Dash?
        </h2>

        <p class="mt-5 text-base leading-7 text-medical-100">
          Advanced brain and spine care led by training, precision, and patient-first communication.
        </p>

        <div class="mt-8 grid grid-cols-2 gap-4">
          @for (stat of stats; track stat.label) {
            <app-stat-card [stat]="stat" />
          }
        </div>

      </div>

      <!-- RIGHT -->
     <div class="grid gap-4 sm:grid-cols-2">

  @for (item of trust; track item.title) {

    <article
      class="rounded-3xl border border-white/10 bg-white/10 p-6 backdrop-blur transition hover:-translate-y-1 hover:bg-white/15">

      <div class="flex items-center gap-4">

        <div class="grid h-12 w-12 shrink-0 place-items-center rounded-2xl bg-medical-400 text-lg font-black text-medical-950">
          <app-medical-icon [name]="item.icon" />
        </div>

        <h3 class="text-lg font-extrabold leading-tight">
          {{ item.title }}
        </h3>

      </div>

      <p class="mt-4 text-sm leading-7 text-medical-100">
        {{ item.description }}
      </p>

    </article>
  }

</div>

    </div>

  </div>
</section>
