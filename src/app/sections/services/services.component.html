<section id="services" class="bg-medical-50 py-16 lg:py-24">
  <div class="container-shell">
    <app-section-heading
      eyebrow="Treatments & Services"
      title="Cutting-Edge Neurosurgical Interventions and Comprehensive Spine Care"
      description="Expert care for complex neurological and spinal disorders with modern techniques."
    />

    <div class="mt-12 grid gap-5 sm:grid-cols-2 lg:grid-cols-4">
      @for (service of services; track service.title) {
        <article class="service-card group overflow-hidden rounded-3xl border border-medical-100 bg-white shadow-sm transition duration-300 hover:-translate-y-2 hover:shadow-lift">
          @if (service.image) {
            <img class="h-32 m-auto object-cover" [src]="service.image" [alt]="service.title" loading="lazy">
          }
          <div class="p-6">
           
            <h3 class="text-xl font-extrabold text-ink">{{ service.title }}</h3>
            <p class="mt-3 text-sm leading-7 text-slate-600">{{ service.description }}</p>
            <a class="mt-6 inline-flex text-sm font-bold text-medical-700" href="#appointment">Consult now</a>
          </div>
        </article>
      }
    </div>
  </div>
</section>
